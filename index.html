<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Carousel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="styles.css" rel="stylesheet">
  </head>

  <body class="bg-dark text-light">
    <div class="container mb-5">
        <h1 class="text-center mb-4">Bootstrap Carousel Examples</h1>


        <div class="row mb-4">
     <div id="carouselExample" class="carousel slide">
     <div class="carousel-inner">
 <div class="carousel-item active">
      <img src="beagle.jpg" class="d-block w-100" alt="Beagle">
  </div>
     <div class="carousel-item">
      <img src="golden (1).jpg" class="d-block w-100" alt="Golden">
   </div>
    <div class="carousel-item">
      <img src="lab.jpg" class="d-block w-100" alt="Lab">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
</div>
<div class="row mb-4">
    <div class="col-6">
        <h2 class="text-center mb-3">Bird Carousel</h2>
          <div id="carouselExample" class="carousel slide"></div>
           <div class="carousel-inner"></div>
            
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
